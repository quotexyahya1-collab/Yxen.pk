<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YXEN - Luxury Bracelets</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: white;
}

/* Navbar */
nav {
    text-align: center;
    padding: 20px;
    font-size: 26px;
    color: gold;
    letter-spacing: 3px;
}

/* Slider */
.slider {
    width: 100%;
    height: 250px;
    overflow: hidden;
    position: relative;
}

.slides {
    display: flex;
    width: 300%;
    animation: slide 9s infinite;
}

.slides img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

@keyframes slide {
    0% {margin-left: 0;}
    33% {margin-left: -100%;}
    66% {margin-left: -200%;}
    100% {margin-left: 0;}
}

/* Section */
.container {
    padding: 20px;
}

/* Products */
.card {
    background: #1a1a1a;
    margin: 20px 0;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    border: 1px solid gold;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card h3 {
    color: gold;
}

.btn {
    display: inline-block;
    margin-top: 10px;
    padding: 10px 20px;
    background: gold;
    color: black;
    text-decoration: none;
    border-radius: 5px;
}

/* Payment */
.payment {
    text-align: center;
    margin-top: 30px;
}

/* Footer */
footer {
    text-align: center;
    margin-top: 40px;
    color: #888;
}
</style>

</head>

<body>

<nav>YXEN</nav>

<!-- SLIDER -->
<div class="slider">
    <div class="slides">
        <img src="yxen-box.jpg">
        <img src="yxen-set.jpg">
        <img src="yxen-pink.jpg">
    </div>
</div>

<div class="container">

<h2 style="text-align:center;">Crafted for Elegance</h2>

<!-- Product 1 -->
<div class="card">
    <img src="yxen-box.jpg">
    <h3>Signature Black Gold</h3>
    <p>Rs 999</p>
    <a href="https://wa.me/923218982343" class="btn">Order Now</a>
</div>

<!-- Product 2 -->
<div class="card">
    <img src="yxen-set.jpg">
    <h3>Premium Collection</h3>
    <p>Rs 1499</p>
    <a href="https://wa.me/923218982343" class="btn">Order Now</a>
</div>

<!-- Product 3 -->
<div class="card">
    <img src="yxen-pink.jpg">
    <h3>Charm Bracelet</h3>
    <p>Rs 1999</p>
    <a href="https://wa.me/923218982343" class="btn">Order Now</a>
</div>

<div class="payment">
<strong>Payment Method</strong><br>
JazzCash: 0321-8982343<br>
Send screenshot on WhatsApp
</div>

<footer>
© 2026 YXEN - Luxury Brand
</footer>

</div>

</body>
</html>
